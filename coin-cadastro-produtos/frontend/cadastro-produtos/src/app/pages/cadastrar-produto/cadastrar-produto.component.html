<main class="form-page">

  <section class="form-card">

    <h1>Cadastrar Produto</h1>

    <p class="description">
      Preencha os dados abaixo para cadastrar um novo produto.
    </p>

    <form  (ngSubmit)="cadastrar()">

      <div class="field">
        <label for="nome">Nome do produto</label>
        <input id="nome" name="nome" type="text" placeholder="Ex: Teclado mecânico"  [(ngModel)]="nome"
          required>
      </div>


      <div class="field">
        <label for="preco">Preço</label>
        <input id="preco" name="preco" type="number" placeholder="Ex: 199.90" [(ngModel)] = "preco" required>
      </div>

      <div class="actions">
        <a routerLink="/" class="btn btn-secondary">Voltar</a>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>

    </form>

        <p class="message">{{ mensagem }}</p>

  </section>

</main>
